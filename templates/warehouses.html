{% extends "base.html" %}
{% block title %}Warehouses{% endblock %}
{% block content %}
  <h1>🏬 Warehouses</h1>

  <div class="card">
    <h2>Add New Warehouse</h2>
    <form action="{{ url_for('add_warehouse') }}" method="post">
      <!-- ───── Add a numeric ID field ────────────────────────────── -->
      <div class="form-group">
        <label for="id">Warehouse ID</label>
        <input
          type="number"
          id="id"
          name="id"
          placeholder="e.g. 100"
          min="1"
          required
        />
      </div>

      <div class="form-group">
        <label for="branch_id">Branch</label>
        <select id="branch_id" name="branch_id" required>
          <option value="">— Select Branch —</option>
          {% for (bid, loc) in get_all_branches() %}
            <option value="{{ bid }}">{{ loc }}</option>
          {% endfor %}
        </select>
      </div>
      <button type="submit">➕ Add Warehouse</button>
    </form>
  </div>

  <div class="card" style="margin-top: 1.5rem;">
    <h2>Existing Warehouses</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Branch</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for (wid, loc) in warehouses %}
        <tr>
          <td>{{ wid }}</td>
          <td>{{ loc or "—" }}</td>
          <td class="actions">
            <button
              class="btn small"
              onclick="document.getElementById('edit-w-{{ wid }}').classList.toggle('hidden')"
            >
              ✏️ Edit
            </button>
            <form
              id="edit-w-{{ wid }}"
              class="hidden inline-form"
              action="{{ url_for('edit_warehouse', wh_id=wid) }}"
              method="post"
            >
              <select name="branch_id" required>
                <option value="">— Select Branch —</option>
                {% for (bid, bloc) in get_all_branches() %}
                  <option value="{{ bid }}" {% if bloc == loc %}selected{% endif %}>
                    {{ bloc }}
                  </option>
                {% endfor %}
              </select>
              <button type="submit">✔️</button>
            </form>

            <form
              class="inline-form"
              action="{{ url_for('delete_warehouse', wh_id=wid) }}"
              method="post"
            >
              <button type="submit" class="btn danger">🗑️ Delete</button>
            </form>

            <a href="{{ url_for('inventory', warehouse_id=wid) }}" class="btn small">
              📦 Inventory
            </a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
